    <circle cx="844" cy="420" r="42" fill="#a7d46f" stroke="#dff1df" stroke-width="18"/>
    <circle cx="762" cy="482" r="34" fill="#a7d46f" stroke="#dff1df" stroke-width="16"/>
  </g>

  <g opacity=".85">
