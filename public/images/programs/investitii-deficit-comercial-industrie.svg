<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title description">
  <title id="title">Investiții industriale moderne</title>
  <description id="description">Ilustrație cu o fabrică automatizată, linie de producție și echipamente tehnologice.</description>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#052f24"/>
      <stop offset=".52" stop-color="#0b6b49"/>
      <stop offset="1" stop-color="#a7d46f"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17352b"/>
      <stop offset="1" stop-color="#061f18"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8faf5"/>
      <stop offset=".45" stop-color="#b9c8c0"/>
      <stop offset="1" stop-color="#5b7469"/>
    </linearGradient>
    <linearGradient id="lime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dff1df"/>
      <stop offset="1" stop-color="#a7d46f"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#dff1df" stop-opacity=".7"/>
      <stop offset="1" stop-color="#dff1df" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#dff1df" stroke-opacity=".1" stroke-width="2"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#02150f" flood-opacity=".45"/>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="url(#background)"/>
  <circle cx="945" cy="210" r="330" fill="url(#glow)"/>
  <circle cx="170" cy="210" r="250" fill="#a7d46f" opacity=".1"/>
  <path d="M0 435C225 315 390 390 575 315S960 160 1200 280V0H0Z" fill="#dff1df" opacity=".08"/>
  <rect y="470" width="1200" height="730" fill="url(#floor)"/>
  <rect y="470" width="1200" height="730" fill="url(#grid)"/>

  <g opacity=".22" fill="none" stroke="#dff1df" stroke-width="18">
